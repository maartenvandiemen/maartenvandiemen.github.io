title: Maarten's blog
author:
  name: Maarten van Diemen

timezone: Europe/Amsterdam
future: false # GitHub Pages will publish future posts if this isn't set to false

show_excerpts: false

remote_theme: jekyll/minima

plugins:
  - jekyll-feed

header_pages:
  - archive-tags.html

minima:
  skin: classic
  date_format: "%Y-%m-%d"
  # Generate social links in footer.
  social_links:
    - { platform: github,         user_url: "https://github.com/maartenvandiemen" }
    - { platform: stackoverflow,  user_url: "https://stackoverflow.com/users/711293/mrtentje" }
    - { platform: twitter,        user_url: "https://twitter.com/maartenvandiemen" }

